Name: user.rpc
ListenOn: 127.0.0.1:8669
HealthProbe:
  Host: 127.0.0.1
  Port: 8670
Telemetry:
  Name: user.rpc
  Disable: true
Etcd:
  Hosts:
    - 127.0.0.1:20001
  Key: user.rpc
Log:
  AccessDetail: request
  SQLMode: slow
  SQLSlowThresholdMs: 100
Data:
  Database:
    Addr: 127.0.0.1:3307
    User: root
    Password: "123456"
    DataBase: lottery_system
    MaxIdleConn: 50           # 空闲连接数，建议为MaxOpenConn的1/2
    MaxOpenConn: 100          # 最大打开连接数，需小于MySQL max_connections
    MaxIdleTime: 300          # 空闲连接存活时间(秒)
    ConnMaxLifetime: 3600     # 连接最大存活时间(秒)
  Redis:
    Addr: 127.0.0.1:6379
    Db: 8
    PassWord: "123456"
    PoolSize: 100             # 连接池大小
    MinIdleConns: 10          # 最小空闲连接数
    MaxRetries: 3             # 最大重试次数
    DialTimeout: 1000         # 连接超时(毫秒)
    ReadTimeout: 1000         # 读超时(毫秒)
    WriteTimeout: 1000        # 写超时(毫秒)
    PoolTimeout: 2000         # 连接池超时(毫秒)
