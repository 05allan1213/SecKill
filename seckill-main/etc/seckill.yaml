Name: seckill.rpc
ListenOn: 127.0.0.1:8002
HealthProbe:
  Host: 127.0.0.1
  Port: 8003
Telemetry:
  Name: seckill.rpc
  Disable: true
Etcd:
  Hosts:
    - 127.0.0.1:20001
  Key: seckill.rpc
Log:
  AccessDetail: request
  SQLMode: slow
  SQLSlowThresholdMs: 100
Fallback:
  Enabled: true
  TimeoutMs: 500
Data:
  Database:
    Addr: 127.0.0.1:3307
    User: root
    Password: "123456"
    DataBase: bitstorm
    MaxIdleConn: 50           # 空闲连接数，建议为MaxOpenConn的1/2
    MaxOpenConn: 100          # 最大打开连接数，需小于MySQL max_connections
    MaxIdleTime: 300          # 空闲连接存活时间(秒)
    ConnMaxLifetime: 3600     # 连接最大存活时间(秒)，避免长时间使用同一连接
  Redis:
    Addr: 127.0.0.1:6379
    Db: 0
    PassWord: "123456"
    PoolSize: 200             # 连接池大小
    MinIdleConns: 20          # 最小空闲连接数
    MaxRetries: 3             # 最大重试次数
    DialTimeout: 1000         # 连接超时(毫秒)
    ReadTimeout: 1000         # 读超时(毫秒)
    WriteTimeout: 1000        # 写超时(毫秒)
    PoolTimeout: 2000         # 连接池超时(毫秒)
  Kafka:
    Producer:
      Brokers:
        - 127.0.0.1:9092
      Topic: seckill
      Ack: 1
    Consumer:
      Brokers:
        - 127.0.0.1:9092
      Topic: seckill
      Offset: 0
      GroupID: seckill-consumer
      NumConsumers: 5         # 消费者数量，建议与分区数匹配
    Retry:
      Topic: seckill-retry
      MaxAttempts: 3
      BackoffMs: 1000
    DLQ:
      Topic: seckill-dlq
